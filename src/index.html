<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="color-scheme" content="dark" />
	<title>SuperInstance · Semantic Search</title>
	<style>
		:root {
			--bg: #0b0d10;
			--bg-elev: #14181d;
			--bg-elev-2: #1c2128;
			--border: #262c34;
			--border-strong: #3a414b;
			--text: #e6e9ef;
			--text-dim: #9aa3b1;
			--text-faint: #6b7280;
			--accent: #7c9cff;
			--accent-strong: #a5b9ff;
			--accent-glow: rgba(124, 156, 255, 0.18);
			--success: #4ade80;
			--danger: #f87171;
			--radius: 10px;
			--radius-sm: 6px;
			--mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
			--sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Inter", sans-serif;
		}

		* { box-sizing: border-box; }

		html, body {
			margin: 0;
			padding: 0;
			background: var(--bg);
			color: var(--text);
			font-family: var(--sans);
			font-size: 15px;
			line-height: 1.5;
			min-height: 100vh;
			-webkit-font-smoothing: antialiased;
		}

		body {
			background:
				radial-gradient(1200px 600px at 50% -200px, var(--accent-glow), transparent 60%),
				var(--bg);
		}

		.container {
			max-width: 760px;
			margin: 0 auto;
			padding: 64px 24px 80px;
		}

		header {
			text-align: center;
			margin-bottom: 40px;
		}

		header .badge {
			display: inline-block;
			font-family: var(--mono);
			font-size: 11px;
			letter-spacing: 0.08em;
			color: var(--accent);
			background: var(--accent-glow);
			border: 1px solid var(--border);
			padding: 4px 10px;
			border-radius: 999px;
			text-transform: uppercase;
			margin-bottom: 16px;
		}

		header h1 {
			margin: 0 0 8px;
			font-size: 32px;
			font-weight: 600;
			letter-spacing: -0.02em;
		}

		header h1 .accent { color: var(--accent); }

		header p {
			margin: 0;
			color: var(--text-dim);
			font-size: 15px;
		}

		.search-box {
			display: flex;
			gap: 8px;
			background: var(--bg-elev);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 6px;
			transition: border-color 0.15s ease, box-shadow 0.15s ease;
		}

		.search-box:focus-within {
			border-color: var(--accent);
			box-shadow: 0 0 0 3px var(--accent-glow);
		}

		.search-box input {
			flex: 1;
			background: transparent;
			border: 0;
			outline: 0;
			color: var(--text);
			font-family: var(--sans);
			font-size: 16px;
			padding: 12px 14px;
		}

		.search-box input::placeholder { color: var(--text-faint); }

		.search-box button {
			background: var(--accent);
			color: #0b0d10;
			border: 0;
			border-radius: var(--radius-sm);
			padding: 0 18px;
			font-weight: 600;
			font-size: 14px;
			cursor: pointer;
			font-family: var(--sans);
			transition: background 0.15s ease;
		}

		.search-box button:hover { background: var(--accent-strong); }
		.search-box button:disabled { background: var(--border-strong); color: var(--text-faint); cursor: not-allowed; }

		.status {
			margin: 16px 2px;
			min-height: 20px;
			font-size: 13px;
			color: var(--text-dim);
		}

		.status.loading::before {
			content: '';
			display: inline-block;
			width: 10px;
			height: 10px;
			border: 2px solid var(--border-strong);
			border-top-color: var(--accent);
			border-radius: 50%;
			vertical-align: -1px;
			margin-right: 8px;
			animation: spin 0.7s linear infinite;
		}

		.status.error { color: var(--danger); }

		@keyframes spin { to { transform: rotate(360deg); } }

		.results {
			display: flex;
			flex-direction: column;
			gap: 10px;
			margin-top: 12px;
		}

		.result {
			background: var(--bg-elev);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 16px 18px;
			transition: border-color 0.15s ease, transform 0.15s ease;
		}

		.result:hover {
			border-color: var(--border-strong);
			transform: translateY(-1px);
		}

		.result header {
			display: flex;
			align-items: baseline;
			justify-content: space-between;
			gap: 12px;
			margin: 0 0 6px;
			text-align: left;
		}

		.result .repo {
			color: var(--accent);
			text-decoration: none;
			font-weight: 600;
			font-size: 15px;
			font-family: var(--mono);
		}

		.result .repo:hover { text-decoration: underline; }

		.result .score {
			font-family: var(--mono);
			font-size: 11px;
			color: var(--text-dim);
			background: var(--bg-elev-2);
			border: 1px solid var(--border);
			padding: 2px 8px;
			border-radius: 999px;
			white-space: nowrap;
		}

		.result .description {
			margin: 4px 0 8px;
			color: var(--text);
			font-size: 14px;
		}

		.result .meta {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
		}

		.result .meta .tag {
			font-family: var(--mono);
			font-size: 11px;
			color: var(--text-dim);
			background: var(--bg-elev-2);
			border: 1px solid var(--border);
			padding: 2px 8px;
			border-radius: 999px;
		}

		.empty {
			text-align: center;
			color: var(--text-faint);
			padding: 40px 0;
			font-size: 14px;
		}

		footer {
			margin-top: 64px;
			text-align: center;
			color: var(--text-faint);
			font-size: 12px;
		}

		footer code {
			font-family: var(--mono);
			background: var(--bg-elev);
			padding: 1px 6px;
			border-radius: 4px;
			border: 1px solid var(--border);
		}

		@media (max-width: 540px) {
			.container { padding: 32px 16px 60px; }
			header h1 { font-size: 26px; }
			.search-box { flex-direction: column; padding: 8px; }
			.search-box button { padding: 10px; }
		}
	</style>
</head>
<body>
	<main class="container">
		<header>
			<span class="badge">Powered by Workers AI · Vectorize</span>
			<h1>SuperInstance <span class="accent">Semantic Search</span></h1>
			<p>Search across all SuperInstance repos by meaning, not just keywords.</p>
		</header>

		<form id="search-form" class="search-box" autocomplete="off">
			<input
				type="text"
				id="q"
				name="q"
				placeholder="e.g. agent memory, fast inference, CLI tool…"
				autofocus
				aria-label="Search query"
			/>
			<button type="submit" id="search-btn">Search</button>
		</form>

		<div id="status" class="status" role="status" aria-live="polite"></div>
		<div id="results" class="results"></div>

		<footer>
			Embeddings via <code>@cf/baai/bge-small-en-v1.5</code> · Built on Cloudflare Workers
		</footer>
	</main>

	<script>
		(function () {
			const form = document.getElementById('search-form');
			const input = document.getElementById('q');
			const btn = document.getElementById('search-btn');
			const status = document.getElementById('status');
			const results = document.getElementById('results');

			const SUPERINSTANCE_ORG = 'https://github.com/SuperInstance/';

			form.addEventListener('submit', (e) => {
				e.preventDefault();
				const q = input.value.trim();
				if (!q) return;
				runSearch(q);
			});

			async function runSearch(q) {
				setStatus('Searching…', 'loading');
				btn.disabled = true;
				results.innerHTML = '';
				try {
					const res = await fetch('/api/search?q=' + encodeURIComponent(q));
					const data = await res.json();
					if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
					renderResults(data, q);
				} catch (err) {
					setStatus('Error: ' + err.message, 'error');
				} finally {
					btn.disabled = false;
				}
			}

			function renderResults(data, q) {
				const count = data.count || 0;
				if (count === 0) {
					setStatus('No matches for "' + q + '".');
					return;
				}
				setStatus(count + ' result' + (count === 1 ? '' : 's') + ' for "' + q + '".');
				const frag = document.createDocumentFragment();
				for (const m of data.results) {
					frag.appendChild(renderResult(m));
				}
				results.appendChild(frag);
			}

			function renderResult(m) {
				const meta = m.metadata || {};
				const repo = meta.repo || meta.name || m.id;
				const description = meta.description || meta.summary || '';
				const tags = [meta.language, meta.topic, meta.category, meta.type].filter(Boolean);

				const repoUrl = /^https?:\/\//.test(repo) ? repo : SUPERINSTANCE_ORG + repo;
				const score = (typeof m.score === 'number') ? m.score.toFixed(4) : '–';

				const el = document.createElement('article');
				el.className = 'result';
				el.innerHTML = `
					<header>
						<a class="repo" href="${escapeAttr(repoUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(repo)}</a>
						<span class="score" title="Similarity score">${escapeHtml(score)}</span>
					</header>
					${description ? `<p class="description">${escapeHtml(description)}</p>` : ''}
					${tags.length ? `<div class="meta">${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
				`;
				return el;
			}

			function setStatus(msg, cls) {
				status.textContent = msg;
				status.className = 'status' + (cls ? ' ' + cls : '');
			}

			function escapeHtml(s) {
				return String(s)
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/"/g, '&quot;')
					.replace(/'/g, '&#39;');
			}
			function escapeAttr(s) { return escapeHtml(s); }
		})();
	</script>
</body>
</html>
